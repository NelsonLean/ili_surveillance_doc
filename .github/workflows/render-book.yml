name: Render and Deploy Bookdown

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev

      - name: Install R packages
        run: Rscript -e "install.packages(c('bookdown','knitr','rmarkdown','kableExtra'), repos='https://cran.r-project.org')"

      - name: Render bookdown
        run: Rscript -e "bookdown::render_book('index.Rmd', output_format='bookdown::gitbook')"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
